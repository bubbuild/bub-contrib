[project]
name = "bub-dynamic-workflows"
version = "0.1.0"
description = "Bee-on-tape dynamic workflow plugin for Bub"
readme = "README.md"
authors = [
    { name = "Bub Build contributors" }
]
requires-python = ">=3.12"
dependencies = [
    "bub",
    "jsonschema>=4.20.0",
    "pydantic>=2.10.0",
    "pyyaml>=6.0.0",
    "redun>=0.44.0",
    "republic>=0.5.7",
]

[project.entry-points.bub]
dynamic-workflows = "bub_dynamic_workflows.plugin:DynamicWorkflowsPlugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["bub_dynamic_workflows", "skills.workflow"]
source-include = ["src/skills/workflow/SKILL.md"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
]
