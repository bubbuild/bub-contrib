[project]
name = "bub-mcp"
version = "0.1.0"
description = "Expose configured MCP servers as Bub tools"
readme = "README.md"
authors = [
    { name = "Frost Ming", email = "me@frostming.com" }
]
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.2.0,<4",
    "pydantic-settings>=2.10.1",
]

[project.entry-points.bub]
mcp = "bub_mcp.plugin:MCPPlugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
