[project]
name = "tape-dataset-opendal"
version = "0.1.0"
description = "Backend-agnostic tape dataset export over the standard Bub tape store interface"
readme = "README.md"
authors = [{ name = "Chojan Shang", email = "psiace@apache.org" }]
requires-python = ">=3.12"
dependencies = [
    "bub",
    "cel-python",
    "opendal>=0.46.0",
    "typer>=0.24.1",
]

[project.entry-points.bub]
tape-dataset-opendal = "tape_dataset_opendal.plugin"

[dependency-groups]
dev = ["pytest>=8.4.2"]

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"
