name: repo_review
description: Review a repository from multiple perspectives.
args_schema:
  type: object
  properties:
    repo:
      type: string
  required:
    - repo
nodes:
  - id: inventory
    description: Build a compact repository map.
    prompt: |
      Inspect the repository at {args.repo}.
      Return the main modules, entry points, and test layout.
  - id: test_review
    description: Review tests after the inventory is available.
    depends_on:
      - inventory
    prompt: |
      Review test coverage using this repository inventory:
      {nodes.inventory}
  - id: risk_review
    description: Identify maintainability and operational risks.
    depends_on:
      - inventory
    prompt: |
      Identify code risks using this repository inventory:
      {nodes.inventory}
  - id: summary
    description: Produce the final review.
    depends_on:
      - test_review
      - risk_review
    prompt: |
      Write a concise final review.
      Test review:
      {nodes.test_review}

      Risk review:
      {nodes.risk_review}
