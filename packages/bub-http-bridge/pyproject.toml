[project]
name = "bub-http-bridge"
version = "0.1.0"
description = "HTTP bridge channel for posting messages into bub sessions"
authors = [
    { name = "Gezi", email = "gezi@example.com" }
]
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.9.0",
    "republic>=0.5.6",
]

[project.entry-points.bub]
http-bridge = "bub_http_bridge.plugin:main"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.23.0",
]
