[project]
name = "bub-acp"
version = "0.1.0"
description = "Run Bub as an ACP server and bridge external ACP agents into Bub"
readme = "README.md"
authors = [
    { name = "PsiACE" }
]
requires-python = ">=3.12"
dependencies = [
    "agent-client-protocol>=0.9.0,<0.10",
    "pydantic-settings>=2.10.1",
]

[project.entry-points.bub]
acp = "bub_acp.plugin:ACPPlugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.1.0",
]
